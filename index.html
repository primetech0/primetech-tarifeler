<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Primetech Tivibu ve Uydu</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="tivibu-uydu.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="../">
        <img src="../assets/primetech-logo.png" alt="Primetech Bilişim" />
        <span>
          <strong>Primetech Bilişim</strong>
          <small>Tivibu ve Uydu tarifeleri</small>
        </span>
      </a>
      <nav class="top-actions" aria-label="Hızlı bağlantılar">
        <a class="pdf-link" href="../">Ana Tarifeler</a>
        <a class="pdf-link" href="#uydu">Uydu</a>
      </nav>
    </header>

    <main>
      <section class="hero tv-hero">
        <div>
          <p class="eyebrow">Tivibu / Uydu</p>
          <h1>Tivibu ve Uydu paketleri ayrı sayfada.</h1>
          <p class="lead">Tivibulu internet paketleri ana sayfada Ev İnterneti altında kalır. Bu sayfada TV, IPTV, Tivibu Ev ve Uydu teklifleri listelenir.</p>
        </div>
        <div class="hero-logo">
          <img src="../assets/primetech-logo.png" alt="" />
        </div>
      </section>

      <section class="controls tv-controls">
        <label class="search">
          <span>Arama</span>
          <input id="tvSearch" type="search" placeholder="Örn: uydu, aile, spor, 18 ay, yan oda" autocomplete="off" />
        </label>
      </section>

      <section class="status-row">
        <p id="tvCount">Paketler yükleniyor.</p>
        <button id="tvClear" type="button">Temizle</button>
      </section>

      <section id="tvCards" class="cards"></section>

    </main>

    <script src="tivibu-uydu.js"></script>
  </body>
</html>
